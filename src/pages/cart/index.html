<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Incognito Farm - Вашата каруца">
  <title>Каруца - Incognito Farm</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/pages/cart/cart.css">
</head>
<body>
  <!-- Header -->
  <div id="header-container"></div>

  <!-- Main Content -->
  <main>
    <section class="page-hero">
      <div class="container">
        <h1 class="text-center">
          <img src="/pages/cart/karuca.svg" alt="Каруца" class="page-title-cart-icon" /> Вашата каруца
        </h1>
        <p class="text-center text-muted">Прегледайте избраните продукти и завършете поръчката</p>
      </div>
    </section>

    <section class="cart-section py-5">
      <div class="container">
        <div class="row">
          <!-- Cart Items -->
          <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 mb-4">
              <div class="card-body">
                <h5 class="card-title mb-4">Продукти в каруцата</h5>
                <div id="cart-items-container">
                  <!-- Cart items will be loaded here -->
                  <div class="text-center text-muted py-5">
                    <img src="/pages/cart/karuca.svg" alt="Каруца" class="cart-icon-lg" />
                    <p class="mt-3">Зареждане на каруцата...</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Cart Summary -->
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 100px;">
              <div class="card-body">
                <h5 class="card-title mb-4">Обобщение</h5>
                
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">Междинна сума:</span>
                  <span id="cart-subtotal">0.00 лв.</span>
                </div>
                
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">Доставка:</span>
                  <span id="cart-shipping">Безплатна</span>
                </div>
                
                <hr>
                
                <div class="d-flex justify-content-between mb-4">
                  <span class="fw-bold">Общо:</span>
                  <span class="fw-bold text-success fs-5" id="cart-total">0.00 лв.</span>
                </div>
                
                <button class="btn btn-success w-100 rounded-pill py-2 mb-3" id="checkout-btn" disabled>
                  <i class="bi bi-check-circle"></i> Завърши поръчката
                </button>
                
                <a href="/products/" class="btn btn-outline-success w-100 rounded-pill py-2">
                  <i class="bi bi-arrow-left"></i> Продължи пазаруването
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Scripts -->
  <script type="module" src="/pages/cart/cart.js"></script>
</body>
</html>
