<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Incognito Farm - Нашите продукти">
  <title>Продукти - Incognito Farm</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/pages/products/products.css">
</head>
<body>
  <!-- Header -->
  <div id="header-container"></div>

  <!-- Main Content -->
  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Нашите продукти</h1>
        <p class="lead text-muted">Откройте разнообразието на свежи и качествени продукти от нашите ферми</p>
      </div>
    </section>

    <section class="products-section py-5">
      <div class="container">
        <div class="d-flex justify-content-center gap-2 mb-5 flex-wrap" id="filterButtons">
          <!-- Filter buttons will be loaded from database -->
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Зареждане...</span>
          </div>
        </div>

        <div class="row g-4" id="productsGrid">
          <!-- Products will be loaded from database -->
          <div class="col-12 text-center text-muted py-5">
            <div class="spinner-border text-success" role="status">
              <span class="visually-hidden">Зареждане...</span>
            </div>
            <p class="mt-3">Зареждане на продукти...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Product Detail Modal -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl product-modal-dialog">
      <div class="modal-content">
        <button type="button" class="btn-close position-absolute" data-bs-dismiss="modal" aria-label="Close" style="top: 10px; right: 10px; z-index: 10;"></button>
        <div class="modal-body p-0">
          <div class="product-detail-layout">
            <section class="product-detail-main">
              <h4 id="productDetailName" class="product-detail-name mb-3">Продукт</h4>
              <div id="productDetailImage" class="product-detail-image">
                🌾
              </div>
              <div class="product-detail-full-info mt-4">
                <h6>Описание</h6>
                <p id="productDetailFullInfo" class="mb-0">Няма описание</p>
              </div>
            </section>

            <aside class="product-detail-side">
              <div class="product-detail-short-info mb-4">
                <h6>Кратка информация</h6>
                <p id="productDetailShortInfo" class="mb-0">Няма кратка информация</p>
              </div>

              <div id="productDetailPricing" class="product-detail-pricing mb-4"></div>

              <div id="productDetailExtra" class="product-detail-extra mb-4"></div>

              <div class="mt-auto pt-3 border-top">
                <div class="quantity-selector d-flex align-items-center justify-content-center mb-2">
                  <button type="button" class="btn btn-outline-success btn-sm" id="modalQtyMinus">−</button>
                  <input type="number" class="form-control form-control-sm text-center mx-2" id="modalQtyInput" value="1" min="1" max="99" style="width: 60px;">
                  <button type="button" class="btn btn-outline-success btn-sm" id="modalQtyPlus">+</button>
                </div>
                <button type="button" class="btn btn-success w-100 d-flex flex-column align-items-center justify-content-center" id="modalAddToCartBtn">
                  <img src="/pages/cart/karuca.svg" alt="" class="btn-cart-icon" />
                  <span>Добави в каруца</span>
                </button>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Scripts -->
  <script type="module" src="/pages/products/products.js"></script>
</body>
</html>
