<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Incognito Farm - Вход">
  <title>Вход - Incognito Farm</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/pages/auth/auth.css">
</head>
<body>
  <!-- Header -->
  <div id="header-container"></div>

  <!-- Main Content -->
  <main class="auth-main py-5">
    <section class="d-flex align-items-center justify-content-center min-vh-100">
      <div class="card shadow-lg rounded-4" style="max-width: 400px; width: 100%;">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-plant2 text-success" style="font-size: 40px;"></i>
            <h1 class="card-title h3 mt-3">Вход в профила</h1>
            <p class="text-muted">Въведете своите данни за вход</p>
          </div>

          <form id="loginForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">
                <i class="bi bi-envelope"></i> Email
              </label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
              <div class="invalid-feedback">Моля, въведете валиден имейл</div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">
                <i class="bi bi-lock"></i> Парола
              </label>
              <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
              <div class="invalid-feedback">Паролата е задължителна</div>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100">
              <i class="bi bi-box-arrow-in-right"></i> Вход
            </button>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <p class="text-muted mb-0">Нямаш профил? <a href="/auth/register/" class="text-success text-decoration-none fw-bold">Регистрирай се</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Scripts -->
  <script type="module" src="/pages/auth/login.js"></script>
</body>
</html>
